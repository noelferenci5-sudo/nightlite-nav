+<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAV - Nightlite MTA V4</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .card { background: #16213e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 350px; text-align: center; border-top: 5px solid #e94560; display: flex; flex-direction: column; align-items: center; }
    img { width: 100px; height: auto; margin-bottom: 15px; }
    h1 { font-size: 22px; margin: 10px 0; color: #e94560; }
    p { font-size: 14px; margin-bottom: 20px; color: #ccc; }
    input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: none; background: #0f3460; color: white; box-sizing: border-box; outline: none; }
    button { width: 100%; padding: 14px; background: #e94560; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.3s; }
    button:hover { background: #c62a48; }
    #titkos { display: none; width: 100%; max-width: 800px; background: #16213e; padding: 30px; border-radius: 15px; border: 1px solid #0f3460; }
    </style>
</head>
<body>

    <!-- LOGIN PANEL -->
    <div id="login-panel" class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e0/Nemzeti_Ad%C3%B3-_%C3%A9s_V%C3%A1mhivatal_log%C3%B3ja.png" alt="NAV">
        <h1>NAV BELÉPÉS</h1>
        <p>Nightlite MTA V4 - Belső rendszer</p>
        <input type="email" id="email" placeholder="E-mail cím">
        <input type="password" id="pass" placeholder="Jelszó">
        <button onclick="login()">BEJELENTKEZÉS</button>
        <p id="error-msg" style="color: #ff4d4d; font-size: 14px; margin-top: 10px;"></p>
    </div>

    <!-- BELSŐ TARTALOM (Csak belépés után) -->
    <div id="titkos">
        <div class="nav-menu">
            <span>Üdvözöljük, <b id="user-email"></b>!</span>
            <button class="logout-btn" onclick="logout()">Kijelentkezés</button>
        </div>
        <h2>NAV - Vezérlőpult</h2>
        <hr border="0" height="1px" background="#333">
        <div style="text-align: left;">
            <h3>Aktuális belső infók:</h3>
            <ul>
                <li>Heti cél: 200 traffipax ellenőrzés.</li>
                <li>BTK frissítés várható a hétvégén.</li>
                <li>Mindenki töltse ki a jelenléti ívet!</li>
            </ul>
            <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                <tr style="background: #e94560;">
                    <th style="padding: 10px;">Név</th>
                    <th>Rendfokozat</th>
                </tr>
                <tr>
                    <td style="padding: 10px; border-bottom: 1px solid #333;">Noel</td>
                    <td style="border-bottom: 1px solid #333;">Leader</td>
                </tr>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // IDE MÁSOLD A SAJÁT FIREBASE CONFIGODAT!
        const firebaseConfig = {
          apiKey: "AIzaSyCcjGv0ZmZf6_v24cu9JJJ7bgKQNw4kiDM",
          authDomain: "nightlite-nav-web.firebaseapp.com",
          projectId: "nightlite-nav-web",
          storageBucket: "nightlite-nav-web.firebasestorage.app",
          messagingSenderId: "860113550259",
          appId: "1:860113550259:web:f0629d33bb7348420069c6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.login = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, email, pass).catch(err => {
                document.getElementById('error-msg').innerText = "Hiba: Rossz email vagy jelszó!";
            });
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-panel').style.display = 'none';
                document.getElementById('titkos').style.display = 'block';
                document.getElementById('user-email').innerText = user.email;
            } else {
                document.getElementById('login-panel').style.display = 'flex';
                document.getElementById('titkos').style.display = 'none';
            }
        });
    </script>
</body>
</html>
