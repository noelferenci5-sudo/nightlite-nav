<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAV - Bejelentkezés</title>
    <!-- Fontok és ikonok -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0f0f;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #0f0f0f 100%);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .header-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-logo h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
        }

        .header-logo .see { color: white; font-weight: 400; }
        .header-logo .mta { color: #00a86b; font-weight: 800; }
        .header-logo .nav-text {
            display: block;
            color: #00a86b;
            font-size: 32px;
            font-weight: 700;
            margin-top: 5px;
        }

        .login-card {
            background-color: #1a1a1a;
            border: 1px solid #2d2d2d;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
        }

        .user-icon {
            background-color: #122a22;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
            color: #00a86b;
            font-size: 30px;
        }

        h2 { margin-bottom: 30px; font-weight: 600; font-size: 24px; }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }

        input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background-color: #121212;
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
            transition: border 0.3s;
        }

        input:focus {
            border-color: #00a86b;
            outline: none;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background-color: #074d34;
            color: #00a86b;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .login-btn:hover {
            background-color: #0a6344;
            color: #00ffa2;
        }

        .footer-info {
            margin-top: 25px;
            font-size: 11px;
            color: #666;
            line-height: 1.6;
        }

        .footer-info a { color: #999; text-decoration: underline; }

        .forgot-pass {
            display: block;
            margin-top: 15px;
            font-size: 12px;
            color: #999;
            text-decoration: underline;
            cursor: pointer;
        }

        /* Sikeres belépés utáni rész */
        #content { display: none; text-align: center; padding: 50px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="header-logo">
            <h1><span class="see">See</span><span class="mta">MTA</span></h1>
            <span class="nav-text">Nemzeti Adó- és Vámhivatal</span>
        </div>

        <div class="login-card">
            <div class="user-icon">
                <i class="fa-regular fa-user"></i>
            </div>
            <h2>Üdvözlünk!</h2>
            
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" placeholder="Felhasználónév">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Jelszó">
            </div>

            <button class="login-btn" onclick="checkLogin()">Bejelentkezés</button>

            <div class="footer-info">
                Ez az oldal a <b>reCAPTCHA</b> védelme alatt áll.<br>
                A Google <a href="#">adatvédelmi irányelvei</a> és <a href="#">szolgáltatási feltételei</a> vonatkoznak rá.
                <span class="forgot-pass">Elfelejtett felhasználónév / jelszó?</span>
            </div>
        </div>
    </div>

    <!-- IDE JÖN A NAV BELSŐ TARTALMA -->
    <div id="content">
        <h1 style="color: #00a86b;">Sikeres belépés!</h1>
        <p>Üdvözöljük a NAV belső felületén.</p>
        <button class="login-btn" style="max-width: 200px;" onclick="location.reload()">Kijelentkezés</button>
    </div>

    <script>
        // --- BEÁLLÍTÁSOK ---
        const FIX_USER = "NAV_Noel"; // Ezt írd át amire akarod
        const FIX_PASS = "nightlite2026"; // EGYENLŐRE EZ A FIX JELSZÓ

        function checkLogin() {
            const userIn = document.getElementById('username').value;
            const passIn = document.getElementById('password').value;

            if(userIn === FIX_USER && passIn === FIX_PASS) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } else {
                alert("Hibás felhasználónév vagy jelszó!");
            }
        }
    </script>
</body>
</html>
